<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #c39bd3; }
    p.subtitle { font-size: 0.9rem; color: #888; margin-bottom: 32px; }
    .search-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 32px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a24;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #c39bd3; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #c39bd3;
      color: #0f0f13;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #d8b4e2; }
    button:disabled { background: #555; color: #888; cursor: default; }
    .import-row {
      width: 100%;
      max-width: 600px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .import-btn {
      background: #1a1a24;
      color: #c39bd3;
      border: 1px solid #c39bd3;
      font-size: 0.9rem;
      padding: 10px 20px;
    }
    .import-btn:hover { background: #2a1a34; }
    .import-confirm {
      display: none;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .import-confirm span { font-size: 0.9rem; color: #e0e0e0; flex: 1; }
    .confirm-yes { background: #c39bd3; color: #0f0f13; font-size: 0.85rem; padding: 8px 16px; }
    .confirm-yes:hover { background: #d8b4e2; }
    .confirm-no { background: transparent; color: #888; border: 1px solid #444; font-size: 0.85rem; padding: 8px 16px; }
    .confirm-no:hover { background: #1a1a24; color: #e0e0e0; }
    .import-status { font-size: 0.85rem; color: #888; text-align: center; min-height: 18px; }
    #results { width: 100%; max-width: 600px; }
    .result-item {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .result-item a {
      color: #88c0d0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      display: block;
    }
    .result-item a:hover { text-decoration: underline; }
    .result-url {
      font-size: 0.78rem;
      color: #555;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty { color: #666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Bookmark Search</h1>
  <p class="subtitle">Search your saved pages with natural language</p>
  <div class="search-row">
    <input type="text" id="query" placeholder="e.g. machine learning tutorials" />
    <button onclick="doSearch()">Search</button>
  </div>
  <div class="import-row">
    <button class="import-btn" id="importBtn" onclick="previewImport()">Import Chrome bookmarks</button>
    <div class="import-confirm" id="importConfirm">
      <span id="importConfirmText"></span>
      <button class="confirm-yes" id="confirmYes" onclick="runImport()">Import</button>
      <button class="confirm-no" onclick="cancelImport()">Cancel</button>
    </div>
    <div class="import-status" id="importStatus"></div>
  </div>
  <div id="results"></div>

  <script>
    document.getElementById("query").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch();
    });

    async function previewImport() {
      const btn = document.getElementById("importBtn");
      const statusEl = document.getElementById("importStatus");
      btn.disabled = true;
      statusEl.textContent = "Checking bookmarks...";
      try {
        const res = await fetch("/import/bookmarks/preview");
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = `Error: ${data.detail || res.statusText}`;
          btn.disabled = false;
          return;
        }
        statusEl.textContent = "";
        btn.style.display = "none";
        document.getElementById("importConfirmText").textContent =
          `Found ${data.to_import} new bookmark${data.to_import !== 1 ? "s" : ""} (${data.already_saved} already saved).`;
        document.getElementById("confirmYes").textContent = `Import ${data.to_import}`;
        document.getElementById("importConfirm").style.display = "flex";
      } catch (err) {
        statusEl.textContent = "Could not reach the server.";
        btn.disabled = false;
      }
    }

    function cancelImport() {
      document.getElementById("importConfirm").style.display = "none";
      document.getElementById("importBtn").style.display = "";
      document.getElementById("importBtn").disabled = false;
      document.getElementById("importStatus").textContent = "";
    }

    async function runImport() {
      document.getElementById("importConfirm").style.display = "none";
      const statusEl = document.getElementById("importStatus");
      statusEl.textContent = "Starting import...";
      try {
        const res = await fetch("/import/bookmarks", { method: "POST" });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = JSON.parse(line.slice(6));
            if (data.done) {
              statusEl.textContent = `Done! Imported ${data.imported} bookmark${data.imported !== 1 ? "s" : ""}.`;
            } else {
              statusEl.textContent = `Importing ${data.imported}/${data.total}...`;
            }
          }
        }
      } catch (err) {
        statusEl.textContent = "Error during import.";
      } finally {
        const btn = document.getElementById("importBtn");
        btn.style.display = "";
        btn.disabled = false;
      }
    }

    async function doSearch() {
      const q = document.getElementById("query").value.trim();
      const container = document.getElementById("results");
      if (!q) return;

      container.innerHTML = '<p class="empty">Searching...</p>';

      try {
        const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          container.innerHTML = '<p class="empty">No results found.</p>';
          return;
        }

        container.innerHTML = data.results
          .map(
            ({ url, title }, i) =>
              `<div class="result-item">
                <span style="color:#666;margin-right:8px">${i + 1}.</span><a href="${url}" target="_blank" rel="noopener">${title || url}</a>
                <div class="result-url">${url}</div>
              </div>`
          )
          .join("");
      } catch (err) {
        container.innerHTML = '<p class="empty">Error connecting to the API.</p>';
      }
    }
  </script>
</body>
</html>
