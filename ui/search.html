<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Search</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #c39bd3; }
    p.subtitle { font-size: 0.9rem; color: #888; margin-bottom: 32px; }
    .search-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 32px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a24;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    input[type="text"]:focus { border-color: #c39bd3; }
    button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #c39bd3;
      color: #0f0f13;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #d8b4e2; }
    button:disabled { background: #555; color: #888; cursor: default; }

    /* Import corner */
    #importCorner {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      max-width: 240px;
    }
    .import-btn {
      background: transparent;
      color: #c39bd3;
      border: 1px solid #c39bd3;
      font-size: 0.8rem;
      font-weight: normal;
      padding: 7px 14px;
    }
    .import-btn:hover { background: #2a1a34; }
    .import-confirm {
      display: none;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }
    .import-confirm span { font-size: 0.8rem; color: #aaa; text-align: right; }
    .import-confirm-actions { display: flex; gap: 6px; }
    .confirm-yes { background: #c39bd3; color: #0f0f13; font-size: 0.8rem; font-weight: bold; padding: 6px 12px; }
    .confirm-yes:hover { background: #d8b4e2; }
    .confirm-no { background: transparent; color: #888; border: 1px solid #444; font-size: 0.8rem; font-weight: normal; padding: 6px 12px; }
    .confirm-no:hover { background: #1a1a24; color: #e0e0e0; }
    .import-status { font-size: 0.75rem; color: #888; text-align: right; min-height: 16px; }
    .import-nudge {
      display: none;
      font-size: 0.75rem;
      color: #e8c76a;
      text-align: right;
      line-height: 1.4;
    }

    /* Trash corner */
    #trashCorner {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100;
    }
    .trash-btn {
      background: transparent;
      color: #666;
      border: 1px solid #333;
      font-size: 0.8rem;
      font-weight: normal;
      padding: 7px 14px;
    }
    .trash-btn:hover { background: #1a1a24; color: #aaa; border-color: #555; }
    #trashPanel {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-start;
      justify-content: center;
      padding-top: 60px;
    }
    #trashPanel.visible { display: flex; }
    .trash-modal {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .trash-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #2a2a3a;
    }
    .trash-modal-header h2 { font-size: 1rem; color: #aaa; font-weight: 600; }
    .trash-close {
      background: none;
      border: none;
      color: #555;
      font-size: 1.2rem;
      padding: 0 4px;
      cursor: pointer;
    }
    .trash-close:hover { color: #aaa; background: none; }
    .trash-list {
      overflow-y: auto;
      padding: 12px 16px;
      flex: 1;
    }
    .trash-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 4px;
      border-bottom: 1px solid #22222e;
      transition: opacity 0.3s;
    }
    .trash-item:last-child { border-bottom: none; }
    .trash-item-info { flex: 1; min-width: 0; }
    .trash-item-title {
      font-size: 0.88rem;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .trash-item-url {
      font-size: 0.75rem;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .trash-item-date { font-size: 0.72rem; color: #444; white-space: nowrap; }
    .recover-btn {
      background: none;
      border: 1px solid #4a7a5a;
      color: #6aaa7a;
      font-size: 0.75rem;
      font-weight: normal;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .recover-btn:hover { background: #6aaa7a; color: #0f0f13; }
    .trash-empty { color: #555; text-align: center; padding: 32px; font-size: 0.9rem; }

    /* Results */
    #results { width: 100%; max-width: 600px; }
    .result-item {
      position: relative;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      transition: opacity 0.3s;
    }
    .result-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 24px;
    }
    .result-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .result-item a {
      color: #88c0d0;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .result-item a:hover { text-decoration: underline; }
    .result-url {
      font-size: 0.78rem;
      color: #555;
      margin-top: 4px;
      padding-left: 24px;
    }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: #444;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .result-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #e06c75; background: none; }
    .delete-confirm {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #2a2a3a;
      font-size: 0.8rem;
      color: #aaa;
    }
    .delete-confirm.visible { display: flex; }
    .delete-yes {
      background: none;
      border: 1px solid #e06c75;
      color: #e06c75;
      font-size: 0.75rem;
      font-weight: normal;
      padding: 3px 10px;
      border-radius: 4px;
    }
    .delete-yes:hover { background: #e06c75; color: #0f0f13; }
    .delete-no {
      background: none;
      border: 1px solid #444;
      color: #888;
      font-size: 0.75rem;
      font-weight: normal;
      padding: 3px 10px;
      border-radius: 4px;
    }
    .delete-no:hover { background: #1a1a24; color: #e0e0e0; }
    .empty { color: #666; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div id="trashCorner">
    <button class="trash-btn" id="trashBtn" onclick="openTrash()">Trash</button>
  </div>

  <div id="trashPanel">
    <div class="trash-modal">
      <div class="trash-modal-header">
        <h2>Deleted bookmarks</h2>
        <button class="trash-close" onclick="closeTrash()">&times;</button>
      </div>
      <div class="trash-list" id="trashList"></div>
    </div>
  </div>

  <div id="importCorner">
    <button class="import-btn" id="importBtn" onclick="previewImport()">↑ Import</button>
    <div class="import-confirm" id="importConfirm">
      <span id="importConfirmText"></span>
      <div class="import-confirm-actions">
        <button class="confirm-yes" id="confirmYes" onclick="runImport()">Import</button>
        <button class="confirm-no" onclick="cancelImport()">Cancel</button>
      </div>
    </div>
    <div class="import-nudge" id="importNudge"></div>
    <div class="import-status" id="importStatus"></div>
  </div>

  <h1>Bookmark Search</h1>
  <p class="subtitle">Search your saved pages with natural language</p>
  <div class="search-row">
    <input type="text" id="query" placeholder="e.g. machine learning tutorials" />
    <button onclick="doSearch()">Search</button>
  </div>
  <div id="results"></div>

  <script>
    document.getElementById("query").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doSearch();
    });

    document.getElementById("trashPanel").addEventListener("click", (e) => {
      if (e.target === document.getElementById("trashPanel")) closeTrash();
    });

    (async function checkUnsaved() {
      try {
        const res = await fetch("/import/bookmarks/preview");
        if (!res.ok) return;
        const data = await res.json();
        if (data.to_import > 0) {
          const nudge = document.getElementById("importNudge");
          nudge.textContent = `⚠ ${data.to_import} bookmark${data.to_import !== 1 ? "s" : ""} not yet imported`;
          nudge.style.display = "block";
        }
      } catch (_) {}
    })();

    async function previewImport() {
      const btn = document.getElementById("importBtn");
      const statusEl = document.getElementById("importStatus");
      btn.disabled = true;
      statusEl.textContent = "Checking...";
      try {
        const res = await fetch("/import/bookmarks/preview");
        const data = await res.json();
        if (!res.ok) {
          statusEl.textContent = `Error: ${data.detail || res.statusText}`;
          btn.disabled = false;
          return;
        }
        statusEl.textContent = "";
        btn.style.display = "none";
        document.getElementById("importConfirmText").textContent =
          `${data.to_import} new bookmark${data.to_import !== 1 ? "s" : ""} (${data.already_saved} already saved)`;
        document.getElementById("confirmYes").textContent = `Import ${data.to_import}`;
        document.getElementById("importConfirm").style.display = "flex";
      } catch (err) {
        statusEl.textContent = "Could not reach the server.";
        btn.disabled = false;
      }
    }

    function cancelImport() {
      document.getElementById("importConfirm").style.display = "none";
      document.getElementById("importBtn").style.display = "";
      document.getElementById("importBtn").disabled = false;
      document.getElementById("importStatus").textContent = "";
    }

    async function runImport() {
      document.getElementById("importConfirm").style.display = "none";
      const statusEl = document.getElementById("importStatus");
      statusEl.textContent = "Starting...";
      try {
        const res = await fetch("/import/bookmarks", { method: "POST" });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = JSON.parse(line.slice(6));
            if (data.done) {
              statusEl.textContent = `Done! ${data.imported} imported.`;
              document.getElementById("importNudge").style.display = "none";
            } else {
              statusEl.textContent = `${data.imported}/${data.total}...`;
            }
          }
        }
      } catch (err) {
        statusEl.textContent = "Error during import.";
      } finally {
        const btn = document.getElementById("importBtn");
        btn.style.display = "";
        btn.disabled = false;
      }
    }

    async function openTrash() {
      document.getElementById("trashPanel").classList.add("visible");
      const list = document.getElementById("trashList");
      list.innerHTML = '<p class="trash-empty">Loading...</p>';
      try {
        const res = await fetch("/deleted");
        const { deleted } = await res.json();
        if (!deleted.length) {
          list.innerHTML = '<p class="trash-empty">No deleted bookmarks.</p>';
          return;
        }
        list.innerHTML = deleted.map(({ url, title, deleted_at }) => {
          const label = title || url;
          const date = new Date(deleted_at).toLocaleDateString();
          const safeUrl = JSON.stringify(url);
          const safeTitle = JSON.stringify(title || "");
          return `<div class="trash-item" id="trash-${btoa(url).replace(/[^a-zA-Z0-9]/g, "")}">
            <div class="trash-item-info">
              <div class="trash-item-title" title="${url}">${label}</div>
              <div class="trash-item-url">${url}</div>
            </div>
            <div class="trash-item-date">${date}</div>
            <button class="recover-btn" onclick="recoverBookmark(${safeUrl}, ${safeTitle}, this)">Recover</button>
          </div>`;
        }).join("");
      } catch (_) {
        list.innerHTML = '<p class="trash-empty">Could not load deleted bookmarks.</p>';
      }
    }

    function closeTrash() {
      document.getElementById("trashPanel").classList.remove("visible");
    }

    async function recoverBookmark(url, title, btn) {
      btn.disabled = true;
      btn.textContent = "Recovering...";
      try {
        const res = await fetch("/deleted/restore", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, title }),
        });
        if (res.ok) {
          window.postMessage({ type: "ADD_BOOKMARK", url, title }, "*");
          const item = btn.closest(".trash-item");
          item.style.opacity = "0";
          setTimeout(() => item.remove(), 300);
        } else {
          btn.textContent = "Failed";
          btn.disabled = false;
        }
      } catch (_) {
        btn.textContent = "Error";
        btn.disabled = false;
      }
    }

    function promptDelete(btn) {
      const card = btn.closest(".result-item");
      card.querySelector(".delete-confirm").classList.add("visible");
      btn.style.opacity = "0";
      btn.style.pointerEvents = "none";
    }

    function cancelDelete(btn) {
      const card = btn.closest(".result-item");
      card.querySelector(".delete-confirm").classList.remove("visible");
      const delBtn = card.querySelector(".delete-btn");
      delBtn.style.opacity = "";
      delBtn.style.pointerEvents = "";
    }

    async function confirmDelete(btn) {
      const card = btn.closest(".result-item");
      const url = card.querySelector(".delete-btn").dataset.url;
      btn.disabled = true;
      try {
        const res = await fetch(`/bookmark?url=${encodeURIComponent(url)}`, { method: "DELETE" });
        if (res.ok) {
          window.postMessage({ type: "REMOVE_BOOKMARK", url }, "*");
          card.style.opacity = "0";
          setTimeout(() => card.remove(), 300);
        } else {
          const noBtn = card.querySelector(".delete-no");
          noBtn.textContent = "Failed — close";
          noBtn.style.color = "#e06c75";
          noBtn.style.borderColor = "#e06c75";
          btn.disabled = false;
        }
      } catch (_) {
        cancelDelete(btn);
      }
    }

    async function doSearch() {
      const q = document.getElementById("query").value.trim();
      const container = document.getElementById("results");
      if (!q) return;

      container.innerHTML = '<p class="empty">Searching...</p>';

      try {
        const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        if (!data.results || data.results.length === 0) {
          container.innerHTML = '<p class="empty">No results found.</p>';
          return;
        }

        container.innerHTML = data.results
          .map(({ url, title }) => {
            let hostname = url;
            try { hostname = new URL(url).hostname; } catch (_) {}
            const safeUrl = JSON.stringify(url);
            return `<div class="result-item">
              <button class="delete-btn" onclick="promptDelete(this)" data-url=${safeUrl} title="Remove bookmark">&times;</button>
              <div class="result-title-row">
                <img class="result-favicon" src="https://www.google.com/s2/favicons?domain=${hostname}&sz=16" />
                <a href="${url}" target="_blank" rel="noopener">${title || url}</a>
              </div>
              <div class="result-url">${hostname}</div>
              <div class="delete-confirm">
                <span>Remove this bookmark?</span>
                <button class="delete-yes" onclick="confirmDelete(this)">Remove</button>
                <button class="delete-no" onclick="cancelDelete(this)">Cancel</button>
              </div>
            </div>`;
          })
          .join("");
      } catch (err) {
        container.innerHTML = '<p class="empty">Error connecting to the API.</p>';
      }
    }
  </script>
</body>
</html>
