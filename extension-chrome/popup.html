<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      width: 260px;
      padding: 20px;
    }
    h2 { font-size: 1rem; color: #c39bd3; margin-bottom: 14px; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #c39bd3;
      color: #0f0f13;
      font-weight: bold;
      font-size: 0.95rem;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover { background: #d8b4e2; }
    button:disabled { background: #555; color: #888; cursor: default; }
    #status {
      font-size: 0.85rem;
      min-height: 18px;
      color: #aaa;
      text-align: center;
    }
    #status.ok { color: #7ec892; }
    #status.err { color: #e06c75; }
    .search-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 0.8rem;
      color: #88c0d0;
      text-decoration: none;
    }
    .search-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Bookmark Saver</h2>
  <button id="saveBtn">Save this page</button>
  <div id="status"></div>
  <a class="search-link" href="http://localhost:8484" target="_blank" rel="noopener">Open search UI →</a>
  <script src="popup.js"></script>
</body>
</html>
